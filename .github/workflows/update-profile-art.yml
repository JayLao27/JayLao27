name: Update profile art

# Refreshes the contribution graph SVG daily from real data.
# Runs daily, plus whenever you push to main, plus on-demand.
# Cron below is in UTC (GitHub Actions does not support timezones directly).
# 22:17 UTC = 6:17 AM Philippine Time (UTC+8), the following day.

"on":
  schedule:
    - cron: "17 22 * * *"   # ~6:17 AM Philippine Time (UTC+8)
  workflow_dispatch: {}
  push:
    branches: [main]

# Prevents concurrent runs from pushing to main at the same time and conflicting
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history to ensure smooth auto-commits

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape real contribution data (no auth needed)
        run: python scripts/fetch_contributions.py

      - name: Render animated contribution graph SVG
        run: python scripts/generate_streak_svg.py JayLao27 contrib-heatmap.svg

      - name: Commit updated art
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"